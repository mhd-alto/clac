<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculater</title>
    
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div id="calculator">
        <input type="text" id="display" readonly placeholder="0" value="0">
        <div class="buttons">
            <button class="top" onclick="toggleMode()">2nd</button>
            <button class="func" onclick="appendSymbol('pi')">π</button>
            <button class="func" onclick="appendSymbol('e')">e</button>
            <button class="clear" onclick="clearAll()">C</button>
            <button class="top" onclick="backspace()">⌫</button>

            <button class="func" onclick="appendSymbol('^2')">x²</button>
            <button class="func" onclick="appendSymbol('1/(')">1/x</button>
            <button class="func" onclick="appendSymbol('abs(')">|x|</button>
            <button class="func" onclick="appendSymbol('exp(')">exp</button>
            <button class="func" onclick="appendSymbol('mod(')">mod</button>

            <button class="func" onclick="appendSymbol('sqrt(')">√x</button>
            <button class="func" onclick="append('(')">(</button>
            <button class="func" onclick="append(')')">)</button>
            <button class="func" onclick="append('!')">n!</button>
            <button class="op" onclick="append('/')">÷</button>

            <button class="func" onclick="append('^')">xʸ</button>
            <button class="num" onclick="append('7')">7</button>
            <button class="num" onclick="append('8')">8</button>
            <button class="num" onclick="append('9')">9</button>
            <button class="op" onclick="append('*')">×</button>

            <button class="func" onclick="append('10^')">10ˣ</button>
            <button class="num" onclick="append('4')">4</button>
            <button class="num" onclick="append('5')">5</button>
            <button class="num" onclick="append('6')">6</button>
            <button class="op" onclick="append('-')">−</button>
            
            <button class="func" onclick="append('log10(')">log</button>
            <button class="num" onclick="append('1')">1</button>
            <button class="num" onclick="append('2')">2</button>
            <button class="num" onclick="append('3')">3</button>
            <button class="op" onclick="append('+')">+</button>
            
            <button class="func" onclick="append('log(')">ln</button>
            <button class="func" onclick="toggleSign()">+/−</button>
            <button class="num wide" onclick="append('0')">0</button>
            <button class="num" onclick="append('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
          </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/mathjs@12.4.2/lib/browser/math.js"></script>    
    <script src="./js/main.js"></script>
  </body>
  </html>
